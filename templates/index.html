<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecruitShield - Fake Recruitment Detection</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light text-dark">

<div class="container my-5">

    <!-- Header Section -->
    <div class="text-center mb-5">
        <h1 class="fw-bold text-primary">
            <i class="bi bi-shield-check"></i>
            Recruit<span class="text-dark">Shield</span>
        </h1>
        <p class="text-muted">Machine Learning Framework for Fake Recruitment Detection</p>

        <button class="btn btn-outline-secondary btn-sm rounded-pill mt-2" id="theme-switcher">
            <i class="bi bi-moon-stars"></i> Toggle Dark Mode
        </button>
    </div>

    <!-- Form Card -->
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow border-0">
                <div class="card-body p-5">

                    <h4 class="fw-bold mb-4">Run Analysis</h4>

                    <form id="predictionForm">

                        <div class="form-floating mb-4">
                            <textarea class="form-control"
                                      id="job_description"
                                      placeholder="Paste job description"
                                      style="height: 180px"
                                      required></textarea>
                            <label for="job_description">Job Description</label>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-uppercase text-muted">
                                Select Classifier Model
                            </label>

                            <select class="form-select form-select-lg" id="model_select">
                                <option value="Logistic Regression">Logistic Regression</option>
                                <option value="Random Forest">Random Forest</option>
                                <option value="SVM">Support Vector Machine (SVM)</option>
                                <option value="Naive Bayes">Naive Bayes</option>
                                <option value="Decision Tree">Decision Tree</option>
                                <option value="KNN">K-Nearest Neighbors (KNN)</option>
                            </select>
                        </div>

                        <div class="d-grid">
                            <button type="submit"
                                    class="btn btn-primary btn-lg rounded-pill">
                                <i class="bi bi-search"></i>
                                Analyze Posting
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>

</div>

<!-- Result Modal -->
<div class="modal fade" id="resultModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg border-0">

            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">Analysis Result</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body text-center p-4">

                <div id="spinnerContainer">
                    <div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div>
                    <p class="mt-3 fw-bold text-muted">
                        Processing using <span id="spinnerAlgorithm"></span> model...
                    </p>
                </div>

                <div id="resultContent" class="d-none">
                    <div id="resultIcon" class="display-1 mb-3"></div>
                    <h2 id="resultText" class="fw-bold"></h2>
                    <p class="text-muted">
                        Model Used: <strong id="resultModel"></strong>
                    </p>
                </div>

            </div>

            <div class="modal-footer border-0 justify-content-center">
                <button class="btn btn-secondary rounded-pill px-4"
                        data-bs-dismiss="modal">
                    Close
                </button>
            </div>

        </div>
    </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
$(document).ready(function() {

    // Load saved theme
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-bs-theme', savedTheme);
    updateThemeIcon(savedTheme);

    // Theme toggle
    $('#theme-switcher').click(function() {
        const currentTheme = document.documentElement.getAttribute('data-bs-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-bs-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
    });

    function updateThemeIcon(theme) {
        if (theme === 'dark') {
            $('#theme-switcher').html('<i class="bi bi-sun-fill text-warning"></i> Light Mode');
        } else {
            $('#theme-switcher').html('<i class="bi bi-moon-stars"></i> Dark Mode');
        }
    }

    // Form submit
    $('#predictionForm').submit(function(e) {
        e.preventDefault();

        const jobDesc = $('#job_description').val();
        const selectedModel = $('#model_select').val();

        const modal = new bootstrap.Modal(document.getElementById('resultModal'));

        $('#spinnerAlgorithm').text(selectedModel);
        $('#spinnerContainer').removeClass('d-none');
        $('#resultContent').addClass('d-none');
        modal.show();

        $.ajax({
            url: '/predict',
            type: 'POST',
            data: {
                job_description: jobDesc,
                model: selectedModel
            },
            success: function(response) {

                setTimeout(function() {

                    $('#spinnerContainer').addClass('d-none');
                    $('#resultContent').removeClass('d-none');

                    $('#resultModel').text(response.model);

                    if (response.is_fake) {
                        $('#resultIcon').html('<i class="bi bi-exclamation-triangle-fill text-danger"></i>');
                        $('#resultText').text('FRAUDULENT')
                                        .removeClass('text-success')
                                        .addClass('text-danger');
                    } else {
                        $('#resultIcon').html('<i class="bi bi-check-circle-fill text-success"></i>');
                        $('#resultText').text('GENUINE')
                                        .removeClass('text-danger')
                                        .addClass('text-success');
                    }

                }, 800);
            },
            error: function(err) {
                $('#spinnerContainer').addClass('d-none');
                $('#resultContent').removeClass('d-none');
                $('#resultIcon').html('<i class="bi bi-x-circle-fill text-warning"></i>');
                $('#resultText').text('ERROR').addClass('text-warning');
                $('#resultModel').text("Prediction failed.");
            }
        });
    });

});
</script>

</body>
</html>
